<!DOCTYPE html>
<html>
<head>
    <title>oref0 Profile</title>
</head>
<body>

<form id="profileForm">

    <h2>General</h2>
    <input name="carb_ratio" value="{{ profile.carb_ratio }}">
    <input name="max_cob" value="{{ profile.maxCOB }}">
    <input name="dia" value="{{ profile.dia }}">
    <input name="current_basal" value="{{ profile.current_basal }}">
    <input name="sens" value="{{ profile.sens }}">

    <hr>

    <h2>Carb Ratios</h2>
    {% for cr in profile.carb_ratios.schedule %}
        <div>
            <input name="cr_i[]" value="{{ cr.i }}">
            <input name="cr_start[]" value="{{ cr.start }}">
            <input name="cr_offset[]" value="{{ cr.offset }}">
            <input name="cr_ratio[]" value="{{ cr.ratio }}">
            <input name="cr_r[]" value="{{ cr.r }}">
            <input name="cr_x[]" value="{{ cr.x }}">
        </div>
    {% endfor %}

    <hr>

    <h2>Basal Profile</h2>
    {% for b in profile.basalprofile %}
        <div>
            <input name="basal_i[]" value="{{ b.i }}">
            <input name="basal_start[]" value="{{ b.start }}">
            <input name="basal_minutes[]" value="{{ b.minutes }}">
            <input name="basal_rate[]" value="{{ b.rate }}">
        </div>
    {% endfor %}

    <hr>

    <h2>ISF Profile</h2>
    {% for s in profile.isfProfile.sensitivities %}
        <div>
            <input name="isf_i[]" value="{{ s.i }}">
            <input name="isf_start[]" value="{{ s.start }}">
            <input name="sensitivity[]" value="{{ s.sensitivity }}">
            <input name="isf_offset[]" value="{{ s.offset }}">
            <input name="isf_x[]" value="{{ s.x }}">
            <input name="endOffset[]" value="{{ s.endOffset }}">
        </div>
    {% endfor %}

    <hr>

    <h2>BG Targets</h2>
    {% for t in profile.bg_targets.targets %}
        <div>
            <input name="target_start[]" value="{{ t.start }}">
            <input name="target[]" value="{{ t.target }}">
            <input name="high[]" value="{{ t.high }}">
            <input name="low[]" value="{{ t.low }}">
        </div>
    {% endfor %}

    <hr>

    <input name="out_units" value="{{ profile.out_units }}">

    <button type="submit">Save</button>

</form>

</body>
</html>

<script>
document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const get = (name) => document.querySelector(`[name="${name}"]`)?.value;

    const toNumber = (v) => v !== undefined && v !== "" ? Number(v) : undefined;

    const data = {
        carb_ratios: {
            schedule: [
                {
                    x: toNumber(get("x")) || 0,
                    i: toNumber(get("i")) || 0,
                    offset: toNumber(get("offset")) || 0,
                    ratio: toNumber(get("ratio")),
                    r: toNumber(get("r")),
                    start: get("start") || "00:00:00"
                }
            ],
            units: get("units") || "grams"
        },

        carb_ratio: toNumber(get("carb_ratio")),
        maxCOB: toNumber(get("max_cob")),
        min_5m_carbimpact: toNumber(get("min_5m_carbimpact")),
        dia: toNumber(get("dia")),
        current_basal: toNumber(get("current_basal")),
        max_iob: toNumber(get("max_iob")),
        max_daily_basal: toNumber(get("max_daily_basal")),
        max_basal: toNumber(get("max_basal")),
        min_bg: toNumber(get("min_bg")),
        max_bg: toNumber(get("max_bg")),
        sens: toNumber(get("sens")),

        basalprofile: [
            {
                i: toNumber(get("basal_i")) || 0,
                start: get("basal_start") || "00:00:00",
                minutes: toNumber(get("basal_minutes")) || 0,
                rate: toNumber(get("basal_rate"))
            }
        ],

        isfProfile: {
            sensitivities: [
                {
                    i: toNumber(get("isf_i")) || 0,
                    start: get("isf_start") || "00:00:00",
                    sensitivity: toNumber(get("sensitivity")),
                    offset: toNumber(get("isf_offset")) || 0,
                    x: toNumber(get("isf_x")) || 0,
                    endOffset: toNumber(get("endOffset")) || 1440
                }
            ]
        },

        bg_targets: {
            units: "mg/dL",
            user_preferred_units: "mg/dL",
            targets: [
                {
                    start: get("target_start") || "00:00:00",
                    target: toNumber(get("target")),
                    high: toNumber(get("high")),
                    low: toNumber(get("low"))
                }
            ]
        },

        out_units: get("out_units") || "mg/dL"
    };

    console.log("Sending JSON:", data);

    const response = await fetch("/your-endpoint", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();
    console.log("Response:", result);
});
</script>
